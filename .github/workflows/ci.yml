name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — catch newly-disclosed advisories
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go — build · vet · gofmt · test · govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test (race)
        run: go test -race ./...

      # Security gate: fail on any vulnerability the code actually reaches.
      # Pinned (the project's exact-pin rule applies to the security gate itself).
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  web:
    name: Web — audit · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Supply-chain gate: install only the integrity-pinned lockfile, never run
      # install scripts (the 2025 npm-worm payload vector).
      - name: Install (no scripts)
        run: npm ci --ignore-scripts

      # Security gate: fail on any moderate-or-higher advisory.
      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Build (tsc + vite)
        run: npm run build

      - name: Test (vitest)
        run: npm run test

  # Weekly run with the LATEST scanners so the pinned green check above doesn't rot
  # as new advisories land. Off the PR path, so it surfaces issues without blocking.
  security-refresh:
    name: Weekly — latest scanners
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck (latest)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm audit (latest advisories)
        working-directory: web
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=moderate
