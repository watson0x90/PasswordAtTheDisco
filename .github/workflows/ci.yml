name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The test suite covers the pure-logic core (scoring, analysis, models,
      # parsing) and the integration modules' testable surface (HIBP lookup,
      # BloodHound data helpers, hashcat command building). These need only the
      # standard library plus chardet (decode_hex) and requests (imported by
      # bloodhound_integration) -- not the full runtime stack (reporting,
      # visualizations). NTLM hashing uses the pure-Python MD4 fallback, so
      # passlib is intentionally omitted.
      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest pytest-cov chardet requests jinja2

      - name: Run tests
        run: python -m pytest tests/ --cov --cov-report=term-missing

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff==0.15.16

      # The full codebase is lint-clean, so this is a hard gate.
      - name: Lint
        run: ruff check . --output-format=github
