name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go — build · vet · gofmt · test · govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...

      # Security gate: fail on any vulnerability the code actually reaches.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  web:
    name: Web — audit · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Supply-chain gate: install only the integrity-pinned lockfile, never run
      # install scripts (the 2025 npm-worm payload vector).
      - name: Install (no scripts)
        run: npm ci --ignore-scripts

      # Security gate: fail on any moderate-or-higher advisory.
      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Build (tsc + vite)
        run: npm run build
